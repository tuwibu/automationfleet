<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>chromefleet test page</title>
<style>
  body { font-family: -apple-system, sans-serif; padding: 20px; }
  input, button { padding: 8px 12px; font-size: 16px; margin-right: 8px; }
  pre { background: #f4f4f4; padding: 12px; max-height: 400px; overflow: auto; }
</style>
</head>
<body>
<h1>chromefleet test page — <span id="winId"></span></h1>
<form id="f">
  <input id="q" name="q" placeholder="type here">
  <button id="submit" type="button">Submit</button>
</form>
<h3>Click counter: <span id="counter">0</span></h3>
<h3>Event log:</h3>
<pre id="log"></pre>
<script>
(() => {
  const params = new URLSearchParams(location.search);
  const id = params.get('id') || 'default';
  document.title = 'Fleet Test ' + id;
  document.getElementById('winId').textContent = id;
  window._fleetLog = [];
  let clicks = 0;

  function log(event, target, value) {
    const entry = { ts: Date.now(), windowId: id, event, target, value };
    window._fleetLog.push(entry);
    const pre = document.getElementById('log');
    pre.textContent = window._fleetLog.slice(-30).map(e =>
      `[${new Date(e.ts).toISOString().slice(11,19)}] ${e.windowId} ${e.event} ${e.target}: ${e.value}`
    ).join('\n');
  }

  const q = document.getElementById('q');
  q.addEventListener('keypress', e => log('keypress', 'q', e.key));
  q.addEventListener('input', e => log('input', 'q', q.value));

  document.getElementById('submit').addEventListener('click', () => {
    clicks++;
    document.getElementById('counter').textContent = clicks;
    log('click', 'submit', q.value);
  });
})();
</script>
</body>
</html>
